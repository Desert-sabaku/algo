name: CI

on:
    pull_request:

jobs:
    ruff:
        name: Ruff (format + lint)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.14"
            - name: Install dependencies
              run: uv sync --group dev
            - name: Format check
              run: uv run ruff format --check $(git ls-files '*.py')
            - name: Lint
              run: uv run ruff check $(git ls-files '*.py')

    pyright:
        name: Pyright (type checking)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.14"
            - name: Install dependencies
              run: uv sync --group dev
            - name: Type-check
              run: uv run pyright

    pytest:
        name: Pytest (tests)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.14"
            - name: Install dependencies
              run: uv sync --group dev
            - name: Run tests
              run: uv run pytest --tb=short --cov --cov-report=term-missing
