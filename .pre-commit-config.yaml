repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.4
      hooks:
          - id: ruff-check
            args: [--fix]
          - id: ruff-format

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: end-of-file-fixer
          - id: trailing-whitespace

    - repo: local
      hooks:
          - id: mypy
            name: mypy
            entry: sh -c "uv run mypy $(git ls-files '*.py')"
            language: system
            pass_filenames: false
          - id: pylint
            name: pylint
            entry: sh -c "uv run pylint $(git ls-files '*.py')"
            language: system
            pass_filenames: false
