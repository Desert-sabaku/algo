[tools]
python = "3.14"

[tasks.mypy]
description = "Run mypy type checking (same target as CI)"
run = "uv run mypy $(git ls-files '*.py')"

[tasks.ruff]
description = "Run ruff format check and lint (same target as CI)"
run = [
  "uv run ruff format --check $(git ls-files '*.py')",
  "uv run ruff check $(git ls-files '*.py')",
]

[tasks.test]
description = "Run pytest with coverage"
run = "uv run pytest --tb=short --cov --cov-report=term-missing"

[tasks.ci-local]
depends = ["ruff", "mypy", "test"]
description = "Run local CI-equivalent checks"
