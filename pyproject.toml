[project]
name = "algo"
version = "0.1.0"
description = "algorithms and data structures practice"
readme = "README.md"
requires-python = ">=3.13"
dependencies = []

[tool.pylint.format]
max-line-length = 100

[tool.mypy]
python_version = "3.13"
strict = true

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

